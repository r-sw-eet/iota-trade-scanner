name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: api/package-lock.json
      - run: npm ci
        working-directory: api
      - run: npm run lint
        working-directory: api
      - run: npm run typecheck
        working-directory: api
      - run: npm run test:cov
        working-directory: api
      - name: Enforce coverage baseline (no regression)
        run: npm run cov:check
        working-directory: api
      - name: Upload API coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./api/coverage/lcov.info
          flags: api
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true

  web-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: website/package-lock.json
      - run: npm ci
        working-directory: website
      - run: npm run test:unit:coverage
        working-directory: website
      - name: Enforce coverage baseline (no regression)
        run: npm run cov:check
        working-directory: website
      - name: Upload web coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./website/coverage/lcov.info
          flags: web
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true

  web-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: website/package-lock.json
      - run: npm ci
        working-directory: website
      - run: npx playwright install --with-deps chromium
        working-directory: website
      - run: npm run test:e2e
        working-directory: website

  deploy:
    needs: [api-test, web-test, web-e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    # Serialize deploys — parallel main pushes (or fast-follow commits) can't
    # race on the SSH deploy step. Pair with the flock inside scripts/deploy.sh
    # so direct invocations on the server are also safe.
    concurrency:
      group: deploy-main
      cancel-in-progress: false
    runs-on: ubuntu-latest
    strategy:
      # Deploy to both hosts; the deploy script adapts based on the compose
      # services defined on each host (web → api+website, scanner → api only).
      # fail-fast: false so a flaky host doesn't skip the other.
      fail-fast: false
      matrix:
        host:
          - name: web
            secret: DEPLOY_HOST_WEB
          - name: scanner
            secret: DEPLOY_HOST_SCANNER
    steps:
      - uses: actions/checkout@v4
      - name: Resolve host for this matrix entry
        id: host
        run: |
          case "${{ matrix.host.name }}" in
            web) echo "addr=${{ secrets.DEPLOY_HOST_WEB }}" >> "$GITHUB_OUTPUT" ;;
            scanner) echo "addr=${{ secrets.DEPLOY_HOST_SCANNER }}" >> "$GITHUB_OUTPUT" ;;
          esac
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ steps.host.outputs.addr }} >> ~/.ssh/known_hosts
      - name: Run deploy script on ${{ matrix.host.name }} (${{ steps.host.outputs.addr }})
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ steps.host.outputs.addr }} 'bash -s' < scripts/deploy.sh
