{

<style>
  :root {
    --bg:        #0B1220;
    --bg-2:      #0E1628;
    --panel:     #111A2B;
    --panel-2:   #152037;
    --border:    #1C2740;
    --border-2:  #2A3958;
    --text:      #F1F5F9;
    --text-dim:  #94A0B8;
    --text-mute: #5E6B85;
    --accent-h: 42; --accent-s: 95%; --accent-l: 55%;
    --accent:      hsl(var(--accent-h) var(--accent-s) var(--accent-l));
    --accent-soft: hsl(var(--accent-h) var(--accent-s) var(--accent-l) / 0.14);
    --accent-ring: hsl(var(--accent-h) var(--accent-s) var(--accent-l) / 0.35);
    --accent-glow: hsl(var(--accent-h) var(--accent-s) calc(var(--accent-l) + 10%) / 0.55);
    --pos:       hsl(145 55% 55%);
    --neg:       hsl(0 65% 60%);
    --radius-lg: 14px;
    --font-body: "Inter", system-ui, sans-serif;
    --font-display: "Instrument Sans", system-ui, sans-serif;
    --font-mono: "JetBrains Mono", ui-monospace, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: var(--font-body); }
  body { min-height: 100vh; overflow-x: hidden; }

  /* cinematic vignette background */
  body::before {
    content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(1200px 800px at 80% -10%, hsl(var(--accent-h) var(--accent-s) var(--accent-l) / 0.10), transparent 60%),
      radial-gradient(1000px 900px at 10% 120%, hsl(220 70% 50% / 0.09), transparent 55%),
      radial-gradient(600px 400px at 50% 50%, hsl(0 0% 100% / 0.015), transparent 70%);
  }
  /* subtle grid */
  body::after {
    content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: 0.4;
    background-image:
      linear-gradient(rgba(241,245,249,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(241,245,249,0.025) 1px, transparent 1px);
    background-size: 40px 40px;
    mask-image: radial-gradient(circle at 50% 40%, black 0%, transparent 85%);
  }

  .page {
    position: relative; z-index: 1;
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto auto auto 1fr auto;
    padding: 88px 48px 56px;
    gap: 56px;
    max-width: 900px;
    margin: 0 auto;
  }

  /* ------- TOP: logo + wordmark + coming soon ------- */
  .top { display: flex; flex-direction: column; align-items: center; gap: 28px; text-align: center; margin-top: 24px; }

  .logo-wrap {
    position: relative;
    width: 148px; height: 148px;
    display: grid; place-items: center;
    overflow: visible;
  }
  /* Outer halo — wide, soft, spills well past the logo's edges. */
  .logo-glow {
    position: absolute; inset: -140px;
    border-radius: 50%;
    background:
      radial-gradient(circle at 50% 50%, hsl(var(--accent-h) var(--accent-s) 62% / 0.55) 0%, hsl(var(--accent-h) var(--accent-s) 62% / 0.28) 22%, transparent 60%);
    filter: blur(42px);
    animation: breathe-glow 4.6s ease-in-out infinite;
    pointer-events: none;
    z-index: 0;
  }
  /* Secondary tighter bloom — picks up the warm color of the art itself */
  .logo-bloom {
    position: absolute; inset: -56px;
    border-radius: 50%;
    background: radial-gradient(circle, hsl(var(--accent-h) var(--accent-s) 58% / 0.5), transparent 58%);
    filter: blur(26px);
    animation: breathe-bloom 4.6s ease-in-out infinite;
    pointer-events: none;
    z-index: 0;
    mix-blend-mode: screen;
  }
  .logo-img {
    position: relative;
    width: 140px; height: 140px;
    border-radius: 30px;
    overflow: hidden;
    z-index: 1;
    box-shadow:
      0 20px 60px -20px hsl(var(--accent-h) var(--accent-s) 40% / 0.5),
      0 0 0 1px rgba(255,255,255,0.04),
      0 1px 0 rgba(255,255,255,0.05) inset;
  }
  .logo-img img {
    display: block; width: 100%; height: 100%; object-fit: cover;
  }
  /* Soft inner-edge vignette — tinted to match the navy bg so it reads as
     glowing-through, not a black ring around the art */
  .logo-img::after {
    content: "";
    position: absolute; inset: 0;
    border-radius: inherit;
    pointer-events: none;
    box-shadow:
      inset 0 0 22px 4px rgba(11, 18, 32, 0.65),
      inset 0 0 6px 1px rgba(14, 22, 40, 0.45);
  }
  /* A blurred clone of the logo that bleeds its pixels OUTWARD beyond the
     crisp tile — this makes the glow feel like it's coming FROM the art */
  .logo-spill {
    position: absolute; inset: -28px;
    border-radius: 36px;
    overflow: hidden;
    filter: blur(22px) saturate(1.2);
    opacity: 0.55;
    pointer-events: none;
    z-index: 0;
    transform: scale(1.18);
    animation: breathe-spill 4.6s ease-in-out infinite;
  }
  .logo-spill img {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }

  @keyframes breathe-glow {
    0%, 100% { opacity: 0.45; transform: scale(0.94); }
    50%      { opacity: 0.95; transform: scale(1.12); }
  }
  @keyframes breathe-bloom {
    0%, 100% { opacity: 0.45; transform: scale(0.92); }
    50%      { opacity: 0.85; transform: scale(1.08); }
  }
  @keyframes breathe-spill {
    0%, 100% { opacity: 0.5;  transform: scale(1.12); }
    50%      { opacity: 0.65; transform: scale(1.22); }
  }

  .wordmark {
    font-family: var(--font-display);
    font-size: 46px;
    font-weight: 600;
    letter-spacing: -0.025em;
    line-height: 1;
    margin: 0;
  }
  .wordmark b { font-weight: 700; }
  .wordmark span { color: var(--text-dim); font-weight: 500; }

  .coming-soon {
    display: inline-flex; align-items: baseline; gap: 4px;
    font-family: var(--font-mono);
    font-size: 11.5px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--text-mute);
  }
  .coming-soon b { color: var(--text-dim); font-weight: 500; }
  .coming-soon sup {
    font-family: var(--font-display);
    font-size: 10px;
    letter-spacing: 0;
    opacity: 0.85;
    margin-left: 2px;
    vertical-align: super;
    color: var(--accent);
  }
  .coming-soon .dot {
    display: inline-block; width: 5px; height: 5px; border-radius: 50%;
    background: var(--accent);
    margin-right: 6px;
    animation: pulse-dot 1.8s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { box-shadow: 0 0 0 0 var(--accent-ring); }
    50%      { box-shadow: 0 0 0 6px transparent; }
  }

  /* ------- COUNTDOWN ------- */
  .countdown {
    display: flex; gap: 24px; justify-content: center;
    font-family: var(--font-mono);
  }
  .countdown .cell { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .countdown .num {
    font-size: 32px;
    font-weight: 500;
    color: var(--text);
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.02em;
    line-height: 1;
    min-width: 1.5ch;
    text-align: center;
  }
  .countdown .lbl {
    font-size: 10.5px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-mute);
  }
  .countdown .sep { color: var(--text-mute); font-size: 28px; align-self: center; opacity: 0.4; }

  /* ------- CAROUSEL ------- */
  .carousel {
    position: relative;
    border: 1px solid var(--border);
    border-radius: 14px;
    background: linear-gradient(180deg, var(--panel) 0%, var(--bg-2) 100%);
    overflow: hidden;
    isolation: isolate;
    box-shadow: 0 30px 80px -30px rgba(0,0,0,0.7),
                0 1px 0 rgba(255,255,255,0.04) inset;
    user-select: none;
    touch-action: pan-y;
    max-width: 810px;
    width: 100%;
    margin: 0 auto;
  }
  .carousel .slides {
    position: relative;
    aspect-ratio: 16 / 9;
    width: 100%;
  }
  .carousel .slide {
    position: absolute; inset: 0;
    opacity: 0;
    transform: scale(1.015);
    transition: opacity 0.6s ease, transform 0.9s ease;
    pointer-events: none;
    padding: 20px 24px;
    display: flex; flex-direction: column;
  }
  .carousel .slide.active {
    opacity: 1;
    transform: scale(1);
    pointer-events: auto;
  }
  .carousel .slide .s-hd {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 18px;
    gap: 16px;
  }
  .carousel .slide .s-eyebrow {
    font-family: var(--font-mono); font-size: 10.5px;
    letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--accent);
  }
  .carousel .slide h2 {
    font-family: var(--font-display);
    font-size: 20px; font-weight: 400;
    margin: 6px 0 2px; letter-spacing: -0.01em;
    line-height: 1.1;
  }
  .carousel .slide .s-sub {
    font-size: 13px; color: var(--text-dim); margin: 0;
  }
  .carousel .slide .s-badge {
    font-family: var(--font-mono); font-size: 10.5px;
    color: var(--text-mute); letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 4px 8px; border: 1px solid var(--border); border-radius: 6px;
    white-space: nowrap;
  }
  .carousel .slide .s-body {
    flex: 1; min-height: 0;
    display: flex;
  }

  /* nav arrows */
  .nav-btn {
    position: absolute; top: 50%; transform: translateY(-50%);
    width: 40px; height: 40px;
    border-radius: 50%;
    background: rgba(11, 18, 32, 0.7);
    border: 1px solid var(--border);
    color: var(--text-dim);
    display: grid; place-items: center;
    cursor: pointer; z-index: 4;
    transition: all 0.15s ease;
    backdrop-filter: blur(8px);
  }
  .nav-btn:hover { color: var(--text); border-color: var(--accent); background: rgba(11, 18, 32, 0.9); }
  .nav-btn.prev { left: 14px; }
  .nav-btn.next { right: 14px; }
  .nav-btn svg { width: 16px; height: 16px; }

  /* progress dots */
  .progress {
    position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 6px; z-index: 4;
  }
  .progress .p {
    width: 28px; height: 3px; border-radius: 2px;
    background: rgba(241,245,249,0.12);
    overflow: hidden;
    cursor: pointer;
    transition: background 0.2s;
  }
  .progress .p:hover { background: rgba(241,245,249,0.25); }
  .progress .p .fill {
    height: 100%; background: var(--accent); width: 0%;
    transition: width 0.1s linear;
  }
  .progress .p.done .fill { width: 100%; }

  /* slide counter */
  .counter {
    position: absolute; top: 16px; right: 18px; z-index: 4;
    font-family: var(--font-mono); font-size: 10.5px;
    color: var(--text-mute); letter-spacing: 0.18em; text-transform: uppercase;
    display: flex; gap: 6px; align-items: center;
  }
  .counter b { color: var(--text-dim); font-weight: 500; }

  /* ------- FOOTER ------- */
  .footer {
    display: flex; flex-direction: column; align-items: center; gap: 20px;
    padding-top: 12px;
  }
  .email-capture {
    display: flex; align-items: center; gap: 0;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 3px;
    transition: border-color 0.2s;
    max-width: 460px;
    width: 100%;
  }
  .email-capture:focus-within { border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-ring); }
  .email-capture input {
    flex: 1;
    border: 0; background: transparent; outline: none;
    color: var(--text); font-family: var(--font-body); font-size: 14px;
    padding: 9px 14px;
  }
  .email-capture input::placeholder { color: var(--text-mute); }
  .email-capture button {
    border: 0; background: var(--accent); color: #0a0e17;
    font-family: var(--font-body); font-weight: 600; font-size: 13px;
    padding: 9px 16px; border-radius: 9px; cursor: pointer;
    letter-spacing: 0.02em;
    transition: filter 0.15s;
  }
  .email-capture button:hover { filter: brightness(1.1); }
  .email-capture.success { border-color: var(--pos); }
  .email-capture.success button { background: var(--pos); }

  .links {
    display: flex; gap: 14px; align-items: center;
    font-size: 12px;
    color: var(--text-mute);
    font-family: var(--font-mono);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .links a {
    color: var(--text-dim);
    text-decoration: none;
    padding: 6px 10px; border-radius: 6px;
    border: 1px solid var(--border);
    transition: all 0.15s ease;
  }
  .links a:hover { color: var(--text); border-color: var(--accent); }
  .links .sep { opacity: 0.4; }
  .links .icon-link { display: inline-flex; align-items: center; gap: 6px; }
  .links .icon-link svg { display: block; flex: 0 0 auto; }

  .fineprint {
    font-family: var(--font-mono); font-size: 10.5px;
    color: var(--text-mute); letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-top: 8px;
  }
  .fineprint a {
    color: var(--text-dim);
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: color 0.15s, border-color 0.15s;
  }
  .fineprint a:hover { color: var(--text); border-bottom-color: var(--accent); }

  /* ------- SVG visual shared styles ------- */
  .viz { width: 100%; height: 100%; display: block; }
  .viz text { font-family: var(--font-mono); fill: var(--text-dim); }
  .viz .tx-head { font-family: var(--font-body); fill: var(--text); }
  .viz .muted { fill: var(--text-mute); }
  .viz .grid-line { stroke: var(--border); stroke-width: 0.5; stroke-dasharray: 2 3; }
  .viz .panel { fill: var(--panel-2); stroke: var(--border); stroke-width: 1; }
  .viz .panel-2 { fill: var(--bg-2); stroke: var(--border); stroke-width: 1; }
  .viz .accent { fill: var(--accent); }
  .viz .accent-stroke { stroke: var(--accent); fill: none; stroke-width: 1.5; stroke-linejoin: round; stroke-linecap: round; }

  @media (max-width: 820px) {
    .page { padding: 32px 16px 20px; gap: 20px; }
    .wordmark { font-size: 32px; }
    .page { padding: 48px 16px 24px; gap: 32px; }
    .logo-wrap { width: 120px; height: 120px; }
    .logo-img { width: 112px; height: 112px; border-radius: 24px; }
    .countdown { gap: 14px; }
    .countdown .num { font-size: 24px; }
    .carousel .slide { padding: 20px 22px 40px; }
    .carousel .slide h2 { font-size: 22px; }
    .nav-btn { width: 32px; height: 32px; }
  }
</style>
</head>
<body>
<div class="page">

  <!-- ========= TOP: Logo + Coming Soon ========= -->
  <header class="top">
    <div class="logo-wrap" aria-hidden="true">
      <div class="logo-glow"></div>
      <div class="logo-spill">
        <picture>
          <source srcset="assets/logo_v2.webp" type="image/webp">
          <img src="assets/logo_v2.png" alt=""/>
        </picture>
      </div>
      <div class="logo-bloom"></div>
      <div class="logo-img">
        <picture>
          <source srcset="assets/logo_v2.webp" type="image/webp">
          <img src="assets/logo_v2.png" alt="IOTA Registry"/>
        </picture>
      </div>
    </div>
    <h1 class="wordmark"><b>IOTA</b> <span>Registry</span></h1>
    <div class="coming-soon">
      <span class="dot"></span>
      <b>Alpha coming soon</b><sup>™</sup>
    </div>
  </header>

  <!-- ========= COUNTDOWN ========= -->
  <div class="countdown" id="countdown" aria-label="Launch countdown">
    <div class="cell"><div class="num" id="cd-d">--</div><div class="lbl">Days</div></div>
    <span class="sep">:</span>
    <div class="cell"><div class="num" id="cd-h">--</div><div class="lbl">Hours</div></div>
    <span class="sep">:</span>
    <div class="cell"><div class="num" id="cd-m">--</div><div class="lbl">Minutes</div></div>
    <span class="sep">:</span>
    <div class="cell"><div class="num" id="cd-s">--</div><div class="lbl">Seconds</div></div>
  </div>

  <!-- ========= CAROUSEL ========= -->
  <section class="carousel" id="carousel" aria-roledescription="carousel" aria-label="Preview of IOTA Registry">

    <div class="slides" id="slides">
      <!-- slides injected here -->
    </div>

    <button class="nav-btn prev" id="btn-prev" aria-label="Previous">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <button class="nav-btn next" id="btn-next" aria-label="Next">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </button>

    <div class="progress" id="progress"></div>
  </section>

  <!-- ========= FOOTER ========= -->
  <footer class="footer">
    <nav class="links">
      <a href="https://iota-trade-scanner.net" target="_blank" rel="noopener" aria-label="Visit our current site">Visit our current site →</a>
      <span class="sep">·</span>
      <a href="mailto:hello@iota-registry.org" aria-label="Contact" class="icon-link">
        <i class="fa-regular fa-envelope" aria-hidden="true"></i>
        <span>hello@iota-registry.org</span>
      </a>
    </nav>
    <div class="fineprint">IOTA Registry © 2026 · Built by the community, for the IOTA ecosystem · Not affiliated with <a href="https://iota.org" target="_blank" rel="noopener">IOTA Foundation</a></div>
  </footer>
</div>

<script src="teaser_slides.js?v=2026-04-22-1"></script>
<script src="teaser.js?v=2026-04-22-1"></script>
